<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anti-Gaspi Vaucluse</title>
    <style>
        body { font-family: sans-serif; background-color: #f0fdf4; color: #166534; padding: 20px; text-align: center; }
        .card { background: white; padding: 20px; border-radius: 15px; max-width: 450px; margin: 0 auto; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid #bbf7d0; }
        h1 { color: #15803d; font-size: 1.5rem; }
        .input-group { text-align: left; margin-bottom: 15px; }
        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.9rem; }
        input { width: 100%; padding: 10px; border: 1px solid #dcfce7; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        button { background-color: #22c55e; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 10px; }
        button:hover { background-color: #16a34a; }
        #resultat { margin-top: 20px; padding: 15px; background: #f0fdf4; border-radius: 10px; border: 1px dashed #22c55e; font-weight: bold; }
    </style>
</head>
<body>

    <div class="card">
        <h1>📊 Stop au Gaspi !</h1>
        <p>Cantine de notre collège (700 élèves)</p>
        
        <div class="input-group">
            <label>🍎 Déchets alimentaires (kg)</label>
            <input type="number" id="bio" placeholder="Ex: 12.5">
        </div>

        <div class="input-group">
            <label>🥖 Pain (kg)</label>
            <input type="number" id="pain" placeholder="Ex: 3">
        </div>

        <div class="input-group">
            <label>🧻 Serviettes & Emballages (kg)</label>
            <input type="number" id="autres" placeholder="Ex: 1.5">
        </div>

        <button onclick="calculer()">CALCULER L'IMPACT</button>

        <div id="resultat">Entrez les pesées du jour.</div>
    </div>

    <script>
        function calculer() {
            const bio = parseFloat(document.getElementById('bio').value) || 0;
            const pain = parseFloat(document.getElementById('pain').value) || 0;
            const autres = parseFloat(document.getElementById('autres').value) || 0;
            
            const total = bio + pain + autres;
            const parEleve = (total / 700) * 1000; // Grammes par élève

            let message = "";
            if(parEleve < 20) { message = "✅ Bravo ! C'est très peu."; }
            else if(parEleve < 50) { message = "⚠️ Attention, on peut mieux faire."; }
            else { message = "🚨 Trop de gaspillage !"; }

            document.getElementById('resultat').innerHTML = `
                <div style="font-size: 1.2rem; color: #15803d;">Total : ${total.toFixed(1)} kg</div>
                <div style="margin-top:5px;">Soit ${parEleve.toFixed(0)}g par élève.</div>
                <div style="margin-top:10px; font-style: italic;">${message}</div>
